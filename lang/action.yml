name: 'Build Language Content'
description: 'Builds localized static content and generates sitemaps using lang.sh'
inputs:
  generate_sitemap:
    description: 'Whether to generate sitemap.xml'
    required: false
    default: 'true'
  config_path:
    description: 'Path to config JSON file'
    required: false
    default: 'lang.json'
  base_url:
    description: 'Base URL for sitemap'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Build and Generate Content
      shell: bash
      env:
        BASE_URL: ${{ inputs.base_url }}
        GENERATE_SITEMAP: ${{ inputs.generate_sitemap }}
      run: |
        node "${{ github.action_path }}/lang.js" "${{ inputs.config_path }}"
