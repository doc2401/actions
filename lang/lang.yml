# Simple workflow for deploying static content to GitHub Pages
name: Deploy Language‌ content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["lang"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
    inputs:
      generate_sitemap:
        description: 'Whether to generate sitemap.xml'
        required: true
        type: boolean
        default: true

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
      - name: Build and Generate Content
        env:
          BASE_URL: ${{ steps.pages.outputs.base_url }}
          GENERATE_SITEMAP: ${{ github.event_name != 'workflow_dispatch' || inputs.generate_sitemap }}
        run: |
          bash .github/workflows/lang.sh .github/workflows/lang.json
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './_public'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
